<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Barbeiro | Chatubas Cortes</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- CSS Unificado -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Modern Design System - Premium Elite */
        :root {
            --bg-deep: #05070a;
            --bg-card: rgba(18, 22, 28, 0.7);
            --accent-cyan: #00f2ff;
            --accent-purple: #9d50bb;
            --accent-green: #00ff88;
            --accent-red: #ff3e3e;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --border-glass: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(12px);
            --shadow-glow: 0 0 30px rgba(0, 242, 255, 0.15);
            --transition-smooth: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: radial-gradient(circle at top right, #111827, #05070a);
            background-color: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .port-warning {
            background: linear-gradient(90deg, #ff3e3e, #8b0000);
            color: white;
            text-align: center;
            padding: 12px;
            font-weight: 600;
            display: none;
            position: sticky;
            top: 0;
            z-index: 9999;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .admin-header {
            text-align: left;
            margin-bottom: 3rem;
        }

        .logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, var(--accent-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo span {
            font-weight: 400;
            opacity: 0.8;
            font-size: 1.8rem;
        }

        .filters-section {
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            align-items: flex-end;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            color: white;
            padding: 14px 20px;
            border-radius: 16px;
            width: 100%;
            outline: none;
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition-smooth);
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
        }

        /* Corrigir cores do dropdown em diferentes navegadores */
        select.glass-input option {
            background-color: #12161c;
            color: white;
            padding: 10px;
        }

        .date-nav {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px;
            border-radius: 18px;
            border: 1px solid var(--border-glass);
        }

        .btn-icon {
            width: 42px;
            height: 42px;
            min-width: 42px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 12px;
            color: var(--accent-cyan);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
        }

        .btn-icon:hover {
            background: var(--accent-cyan);
            color: #000;
            transform: scale(1.05);
            box-shadow: var(--shadow-glow);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            /* Alinhar pela base */
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid var(--border-glass);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .stat-item h3 {
            margin: 0;
            line-height: 1;
            font-size: 2.5rem;
            /* Um pouco maior e mais impactante */
            font-weight: 800;
            color: var(--accent-cyan);
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Appointment Cards */
        .appointment-list {
            display: grid;
            gap: 1.2rem;
            margin-top: 1rem;
        }

        .appointment-item {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 2rem;
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-glass);
            padding: 24px 30px;
            border-radius: 24px;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .appointment-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 6px;
            background: var(--accent-cyan);
            box-shadow: 4px 0 15px rgba(0, 242, 255, 0.2);
        }

        .appointment-item:hover {
            transform: translateX(8px) scale(1.01);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .appointment-item.concluido {
            opacity: 0.85;
            background: rgba(0, 255, 136, 0.03);
        }

        .appointment-item.concluido::before {
            background: var(--accent-green);
            box-shadow: 4px 0 15px rgba(0, 255, 136, 0.2);
        }

        .time-badge {
            background: rgba(0, 242, 255, 0.08);
            color: var(--accent-cyan);
            font-size: 1.4rem;
            font-weight: 800;
            padding: 12px 20px;
            border-radius: 16px;
            min-width: 100px;
            text-align: center;
            border: 1px solid rgba(0, 242, 255, 0.15);
        }

        .appointment-item.concluido .time-badge {
            background: rgba(0, 255, 136, 0.08);
            color: var(--accent-green);
            border-color: rgba(0, 255, 136, 0.15);
        }

        .client-info h4 {
            margin: 0 0 6px 0;
            font-size: 1.25rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .client-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .meta-item {
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .meta-item i {
            color: var(--accent-cyan);
            font-size: 0.8rem;
        }

        .status-badge {
            background: var(--accent-green);
            color: #000;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            margin-left: 10px;
            vertical-align: middle;
        }

        .action-btns {
            display: flex;
            gap: 12px;
        }

        .btn-action {
            padding: 12px 24px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: var(--transition-smooth);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-wa {
            background: #25D366;
            color: #fff;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2);
        }

        .btn-wa:hover {
            background: #1eb954;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3);
        }

        .btn-check {
            background: var(--accent-green);
            color: #000;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.2);
        }

        .btn-check:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 255, 136, 0.3);
        }

        .btn-del {
            background: rgba(255, 62, 62, 0.1);
            color: var(--accent-red);
            border-color: rgba(255, 62, 62, 0.2);
        }

        .btn-del:hover {
            background: var(--accent-red);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 62, 62, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .btn-outline:hover {
            background: var(--accent-cyan);
            color: #000;
            box-shadow: var(--shadow-glow);
        }

        .empty-state {
            text-align: center;
            padding: 80px 40px;
            background: var(--bg-card);
            border: 1px dashed var(--border-glass);
            border-radius: 32px;
            color: var(--text-secondary);
        }

        .empty-state p {
            margin-bottom: 20px;
        }

        @media (max-width: 900px) {
            .appointment-item {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 1.5rem;
            }

            .time-badge {
                margin: 0 auto;
            }

            .action-btns {
                justify-content: center;
            }

            .client-meta {
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div id="portWarning" class="port-warning">
        ⚠️ Atenção: Você está usando a porta errada (5500). Por favor, use: <a href="http://localhost:3000/painel.html"
            style="color: white; text-decoration: underline;">http://localhost:3000/painel.html</a>
    </div>
    <div class="container">
        <header class="admin-header">
            <div class="logo">CHATUBAS <span>PAINEL</span></div>
            <p style="color: var(--text-secondary); margin-top: 0.5rem; letter-spacing: 1px;">SISTEMA DE GESTÃO ELITE
            </p>
        </header>

        <section class="filters-section">
            <div class="filters-grid">
                <div class="input-group">
                    <label for="barberFilter"><i class="fas fa-user-tie"
                            style="margin-right: 8px; color: var(--accent-cyan);"></i>Barbeiro Responsável</label>
                    <select id="barberFilter" class="glass-input">
                        <option value="Pablo">Pablo</option>
                        <option value="Vinicios">Vinicios</option>
                        <option value="Zoio">Zoio</option>
                    </select>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-calendar-alt" style="margin-right: 8px; color: var(--accent-cyan);"></i>Data
                        da Agenda</label>
                    <div class="date-nav">
                        <button id="prevDay" type="button" class="btn-icon" title="Dia Anterior">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <input type="date" id="dateFilter" class="glass-input">
                        <button id="nextDay" type="button" class="btn-icon" title="Próximo Dia">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-label">Agendamentos</div>
                    <h3 id="totalCount">0</h3>
                </div>
                <button id="todayBtn" class="btn-outline">VOLTAR PARA HOJE</button>
            </div>
        </section>

        <div id="loading" class="empty-state" style="display: none;">
            <i class="fas fa-spinner fa-spin"
                style="font-size: 2rem; color: var(--accent-cyan); margin-bottom: 1rem;"></i>
            <p>Carregando agenda...</p>
        </div>

        <div id="appointmentList" class="appointment-list">
            <!-- Os agendamentos serão inseridos aqui via JS -->
        </div>
    </div>
    <footer
        style="margin-top: 3rem; text-align: center; padding-bottom: 2rem; color: var(--text-secondary); font-size: 0.8rem;">
        &copy; 2026 Chatubas Cortes - Sistema de Gestão Interna
    </footer>
    </div>

    <script src="js/painel.js"></script>
</body>

</html>
